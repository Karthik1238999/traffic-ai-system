<!DOCTYPE html>
<html>
<head>
    <title>Traffic AI Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">

    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

<h1>🚦 Traffic AI Smart Dashboard</h1>

<div class="container">
    
    <!-- METRICS -->
    <div class="metrics">
        <h2>📊 System Metrics</h2>
        <p>Total Junctions: <span id="total"></span></p>
        <p>Average Traffic: <span id="avg"></span></p>
        <p>Status: <span id="status"></span></p>
    </div>

    <!-- MAP -->
    <div id="map"></div>

</div>

<script>
    var map = L.map('map').setView([13.0827, 80.2707], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: 'Traffic AI'
    }).addTo(map);

    var markers = [];

    function loadData() {
        fetch('/data')
        .then(res => res.json())
        .then(data => {
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            data.forEach(j => {
                var color = j.status === "red" ? "red" : "green";

                var marker = L.circleMarker([j.lat, j.lon], {
                    color: color,
                    radius: 10
                }).addTo(map);

                marker.bindPopup(
                    `<b>${j.name}</b><br>Traffic: ${j.traffic}`
                );

                markers.push(marker);
            });
        });
    }

    function loadMetrics() {
        fetch('/metrics')
        .then(res => res.json())
        .then(m => {
            document.getElementById("total").innerText = m.total_junctions;
            document.getElementById("avg").innerText = m.avg_traffic;
            document.getElementById("status").innerText = m.status;
        });
    }

    setInterval(() => {
        loadData();
        loadMetrics();
    }, 3000);

    loadData();
    loadMetrics();
</script>

</body>
</html>
