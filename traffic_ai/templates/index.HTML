<!DOCTYPE html>
<html>
<head>
    <title>Traffic AI Dashboard</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

    <style>
        body { margin:0; font-family: Arial; }
        #map { height: 100vh; }

        .container {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .panel {
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 12px;
            border-radius: 10px;
            width: 220px;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="container">

    <div class="panel">
        <h3>🚦 Traffic AI</h3>
        <p>🟢 Low</p>
        <p>🟡 Medium</p>
        <p>🔴 High</p>
        <p>🟣 Incident</p>
    </div>

    <div class="panel">
        <h4>📊 Metrics</h4>
        <div id="metrics"></div>
    </div>

    <div class="panel">
        <h4>🔥 Top Congested</h4>
        <div id="top"></div>
    </div>

    <div class="panel">
        <h4>⚙️ System</h4>
        AI: ACTIVE 🤖<br>
        Mode: Adaptive<br>
        Control: Live
    </div>

</div>

<script>
var map = L.map('map').setView([13.01, 80.27], 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers = {};
let heatLayer;

async function loadData() {
    let res = await fetch('/data');
    let data = await res.json();

    let heatPoints = [];
    let highCount = 0;

    for (let key in data.traffic) {
        let t = data.traffic[key];
        let pos = data.positions[key];

        if (!pos) continue;

        let lat = 13.01 + pos[1] * 0.00001;
        let lon = 80.27 + pos[0] * 0.00001;

        let color = "green";

        if (t.current > 15) {
            color = "red";
            highCount++;
        } else if (t.current > 5) {
            color = "orange";
        }

        let radius = Math.max(5, Math.min(20, 6 + t.current * 0.4));

        if (t.incident) {
            color = "purple";
            radius = 25;

            console.log("🚨 Incident at " + key);
        }

        let trend = t.predicted > t.current ? "📈" : "📉";

        heatPoints.push([lat, lon, t.current / 20]);

        if (!markers[key]) {
            markers[key] = L.circleMarker([lat, lon], {
                radius: radius,
                color: color,
                fillColor: color,
                fillOpacity: 0.7
            }).addTo(map);
        }

        markers[key].setStyle({
            radius: radius,
            color: color,
            fillColor: color
        });

        markers[key].bindPopup(
            "🚦 Junction: " + key +
            "<br>Current: " + t.current +
            "<br>Predicted: " + t.predicted +
            "<br>Trend: " + trend +
            "<br>Signal: " + t.action +
            "<br>Incident: " + (t.incident ? "🚨 YES" : "No") +
            "<br>Reroute: " + t.reroute
        );
    }

    if (heatLayer) map.removeLayer(heatLayer);

    heatLayer = L.heatLayer(heatPoints, {
        radius: 25,
        blur: 15
    }).addTo(map);

    // Metrics
    document.getElementById("metrics").innerHTML =
        "Total Junctions: " + Object.keys(data.traffic).length +
        "<br>High Congestion: " + highCount +
        "<br>Total Delay: " + data.metrics.total_delay +
        "<br>Status: LIVE 🔴";

    // Top congested
    let sorted = Object.entries(data.traffic)
        .sort((a, b) => b[1].current - a[1].current)
        .slice(0, 5);

    let topHTML = "";
    sorted.forEach(([id, t]) => {
        topHTML += id + " : " + t.current + "<br>";
    });

    document.getElementById("top").innerHTML = topHTML;
}

setInterval(loadData, 2000);
loadData();
</script>

</body>
</html>
